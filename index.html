<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hi Lila! i have a messages for u 🤍</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="intro" id="introText">
    I hope that after you read this, there will be a spirit that rises within you.
  </div>
  <button class="btn" onclick="showLetter()">Read it</button>

  <div class="letter" id="letterBox">
    <p id="typedText"></p>
    <img src="ttd.png" alt="Signature" class="signature" />
  </div>

  <audio id="bg-music" autoplay loop muted>
    <source src="bergema sampai selamanya.mp3" type="audio/mpeg">
  </audio>

  <script>
    const music = document.getElementById("bg-music");

    window.addEventListener("load", () => {
      music.muted = false;
      music.play().catch(() => {
        document.addEventListener("click", () => {
          music.play();
        }, { once: true });
      });
    });
  </script>

  <script src="script.js"></script>
</body>

</html>
